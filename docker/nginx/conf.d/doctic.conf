# ============================================================
# Nginx — doctic.conf (SSL + Reverse Proxy)
# ============================================================

# ─── Redirection HTTP → HTTPS ──────────────────────────────
server {
    listen 80;
    server_name doctic.fr www.doctic.fr;

    # ACME challenge pour Let's Encrypt (renouvellement SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Healthcheck Nginx (pour docker healthcheck)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Principal ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name doctic.fr www.doctic.fr;

    # ── Certificats SSL ──
    ssl_certificate     /etc/letsencrypt/live/doctic.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctic.fr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/doctic.fr/chain.pem;

    # ── Sécurité SSL ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (accélère la validation SSL)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Headers de sécurité ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:;" always;

    # ── Frontend React (SPA) ──
    location / {
        proxy_pass http://frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── API Backend ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;      # Réponses IA longues
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffering off;          # Streaming SSE
    }

    # ── Routes IA (rate limit plus strict) ──
    location /api/ai/ {
        limit_req zone=ai burst=5 nodelay;

        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # SSE (Server-Sent Events) — ne pas bufferiser
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }

    # ── WebSocket (Téléconsult / Temps réel) ──
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── MinIO (Fichiers médicaux) ──
    location /files/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
        proxy_read_timeout 600s;
    }
}
